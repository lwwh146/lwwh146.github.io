name: Deploy Weight Tracker

on:
  push:
    branches: [ main ]  # 如果你的主分支叫 master，请改为 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist      # Vite 打包后的文件夹名称
          branch: gh-pages  # 自动化部署到 gh-pages 分支